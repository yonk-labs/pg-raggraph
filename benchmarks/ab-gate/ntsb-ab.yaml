# A/B-gate ingest config for NTSB — pg-raggraph-adapted copy.
#
# Adapted from ../chunkshop/docs/samples/bakeoff-ntsb/bakeoff-ntsb-ab.yaml with:
#   1. embedder model BAAI/bge-base-en-v1.5 (matched to pg-raggraph query side)
#   2. absolute corpus glob (so the run works from any cwd)
#
# Run:
#   cd ../chunkshop/python
#   export CHUNKSHOP_TEST_DSN=postgresql://postgres:postgres@localhost:5434/chunkshop_test
#   uv run --no-sync chunkshop ingest --config /home/yonk/yonk-tools/pg-raggraph/benchmarks/ab-gate/ntsb-ab.yaml

cell_name: ntsb_ab_gate

source:
  type: files
  glob: /home/yonk/yonk-tools/chunkshop/docs/samples/bakeoff-ntsb/corpus/*.md
  id_from: stem

chunker:
  type: consolidation
  base:
    type: hierarchy
    prefix_heading: true
    min_section_chars: 100
  consolidator:
    mode: lede_spacy
    confidence_floor: 0.0
    max_facts: 20
    model: en_core_web_sm
  fact_max_chars: 1200

embedder:
  type: fastembed
  model_name: BAAI/bge-base-en-v1.5   # matched to pg-raggraph query side (768-d)
  dim: 768
  threads: 4
  batch_size: 64

extractor:
  type: cooccurrence
  top_k: 15
  min_chars: 3
  max_summary_chars: 1000
  min_pair_count: 1

target:
  type: postgres
  dsn_env: CHUNKSHOP_TEST_DSN
  database: ab_ntsb              # dedicated schema — avoids clobbering scotus on force_overwrite
  table: ntsb_ab
  mode: overwrite
  force_overwrite: true
  hnsw: false

runtime:
  omp_num_threads: 4
  heartbeat_every: 20
  log_path: /tmp/chunkshop-ntsb-ab.log
