# SCOTUS 50-question retrieval and answer-quality fixture.
#
# Purpose:
# - Keep "is this a fair RAG question?" explicit.
# - Separate exhaustive corpus/metadata questions from semantic top-k questions.
# - Give the deep harness a stable 5-bucket workload for retrieval, context
#   packing, summary/facts compression, and llm-judge answer scoring.
#
# Query-set contract:
# - impossible_for_llm_topk_rag: do not score top-k semantic RAG as a failure.
#   These require exhaustive metadata/SQL-style aggregation first.
# - hard_llm_metadata_rag: use metadata or multi-hop retrieval first, then RAG
#   for support/explanation.
# - medium_semantic_rag: fair hybrid/semantic retrieval questions.
# - easy_semantic_rag: direct single-case facts.
# - layup_summary: the answer should be visible in a compact lede/report summary.

name: scotus_50_query_buckets
version: 1
workload: scotus
corpus:
  type: files
  glob: /home/yonk/yonk-tools/pg-raggraph/benchmarks/scotus/*.md
  ingested_schema: chunkshop_lede_report_scotus
  source_policy: raw_markdown_only

buckets:
  impossible_for_llm_topk_rag:
    count: 10
    difficulty: impossible
    rag_applicable: false
    retrieval_contract: exhaustive_metadata_query
    description: >
      Corpus-wide aggregation, absence, or complete-set questions. A top-k RAG
      run cannot prove it has seen every relevant document, so these should be
      answered with promoted metadata/SQL first and optionally explained with
      RAG after the deterministic result is known.
  hard_llm_metadata_rag:
    count: 10
    difficulty: hard
    rag_applicable: conditional
    retrieval_contract: metadata_or_multihop_then_context
    description: >
      Cross-document, comparison, or multi-hop questions. These are fair for a
      richer retrieval system that can decompose the query, filter by metadata,
      retrieve multiple supporting cases, and then ask the LLM to synthesize.
  medium_semantic_rag:
    count: 10
    difficulty: medium
    rag_applicable: true
    retrieval_contract: hybrid_or_semantic_topk
    description: >
      Answerable when semantic/FTS retrieval lands on the right case and sends
      enough local context to the answer model.
  easy_semantic_rag:
    count: 10
    difficulty: easy
    rag_applicable: true
    retrieval_contract: single_case_retrieval
    description: >
      Direct single-case facts that should be easy for normal hybrid retrieval
      over raw chunks.
  layup_summary:
    count: 10
    difficulty: layup
    rag_applicable: true
    retrieval_contract: summary_should_suffice
    description: >
      Header/lede-level facts that should survive summary, summary+TOC, and
      summary+TOC+facts context packing.

