  - Captain Balfour shared tales from Nefta.
  - Captain Balfour procured delicious dates in Nefta.
  - Mr. Reade met Atlas Jews in Mogador.
  - The Atlas Jews impressed Mr. Reade with their stature.
  - The stature of Atlas Jews is different from other Jews in Morocco.
  - Mr. Reade visited Roman ruins in Jereed.
  - Commerce flows from Tunis towards the Sahara.
  - Every stop in North Africa reveals a new facet of the land.
