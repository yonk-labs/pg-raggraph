- id: Medical-f9a73f1e
  question: How is cervical cancer staged and what are the main treatment modalities
    at different stages?
  gold_answer: Cervical cancer is staged using the FIGO system (Stages I-IV with sub-stages);
    early-stage disease is mainly treated with surgery (including fertility-sparing
    options), while locally advanced stages are managed with chemoradiation, and metastatic
    or recurrent disease may require systemic therapy including chemotherapy, targeted
    therapy, or immunotherapy.
  required_facts:
  - Cervical cancer is staged using the FIGO system.
  - The FIGO system includes Stages I-IV with sub-stages.
  - Early-stage cervical cancer is mainly treated with surgery.
  - Fertility-sparing options are available for early-stage cervical cancer treatment.
  - Locally advanced stages of cervical cancer are managed with chemoradiation.
  - Metastatic or recurrent cervical cancer may require systemic therapy.
  - Systemic therapy for cervical cancer may include chemotherapy.
  - Systemic therapy for cervical cancer may include targeted therapy.
  - Systemic therapy for cervical cancer may include immunotherapy.
  question_class: Contextual Summarize
- id: Medical-53e61e6b
  question: Rewrite the mouth cancer practice guideline into a concise discharge summary
    for a patient who underwent initial evaluation and is pending definitive treatment.
    Include diagnostic findings, staging, risk factors, and recommendations for next
    steps.
  gold_answer: '**Discharge Summary**


    Patient: [Name], [Age/Sex]

    Diagnosis: Squamous cell carcinoma of the oral cavity (tongue, front two-thirds)


    Summary:

    The patient presented with a lesion of the lateral tongue. Imaging (MRI, CT) revealed
    a 2.2 cm mass with a depth of invasion of 6 mm and no evidence of distant metastasis.
    Biopsy confirmed squamous cell carcinoma. Fine-needle aspiration of a submandibular
    lymph node was negative for metastasis. Performance status is ECOG 1. The patient
    has a history of tobacco and alcohol use. Panoramic dental x-ray identified dental
    issues requiring management before treatment. Biomarker testing (PD-L1, MSI-H/dMMR,
    TMB) is pending.


    Staging: Stage II (T2N0M0) per TNM classification.


    Recommendations:

    - Complete biomarker testing

    - Dental, speech and swallowing, and nutrition assessments

    - Smoking and alcohol cessation support

    - Discuss fertility preservation if relevant

    - Multidisciplinary tumor board review for treatment planning


    Follow-up: Outpatient oncology clinic in 1 week.'
  required_facts:
  - The patient is diagnosed with squamous cell carcinoma of the oral cavity.
  - The lesion is located on the tongue, specifically the front two-thirds.
  - Imaging (MRI, CT) revealed a 2.2 cm mass.
  - The depth of invasion is 6 mm.
  - There is no evidence of distant metastasis.
  - A biopsy confirmed squamous cell carcinoma.
  - Fine-needle aspiration of a submandibular lymph node was negative for metastasis.
  - The performance status is ECOG 1.
  - The patient has a history of tobacco use.
  - The patient has a history of alcohol use.
  - A panoramic dental x-ray identified dental issues requiring management.
  - Biomarker testing (PD-L1, MSI-H/dMMR, TMB) is pending.
  - The staging is Stage II (T2N0M0) per TNM classification.
  - Recommendations include completing biomarker testing.
  - Recommendations include dental, speech and swallowing, and nutrition assessments.
  - Recommendations include smoking and alcohol cessation support.
  - Recommendations include discussing fertility preservation if relevant.
  - Recommendations include multidisciplinary tumor board review for treatment planning.
  - Follow-up is scheduled for the outpatient oncology clinic in 1 week.
  question_class: Creative Generation
- id: Medical-cdbc8593
  question: You are a pediatric hematologist receiving a referral for a 7-year-old
    newly diagnosed with acute lymphoblastic leukemia (ALL). Write a detailed initial
    case summary, including diagnostic confirmation, subtype differentiation, risk
    assessment, and your preliminary treatment plan, citing evidence-based steps from
    the clinical guideline.
  gold_answer: 'Case Summary: The patient is a 7-year-old child with a new diagnosis
    of acute lymphoblastic leukemia (ALL), the most common cancer in children. Diagnostic
    workup included blood tests and bone marrow aspiration, revealing more than 20%
    lymphoblasts in the marrow. Subtype analysis is pending to distinguish between
    B-cell ALL (B-ALL) and T-cell ALL (T-ALL), as B-ALL is more common, but T-ALL
    may present with an enlarged thymus or breathing problems. Further evaluation
    includes imaging tests, heart function assessment, and a lumbar puncture to assess
    CNS involvement. Biomarker and pharmacogenomic testing are ordered to assess for
    BCR::ABL1 status and other genetic alterations that may influence therapy. All
    patients with ALL receive steroids and multiagent chemotherapy, with systemic
    therapy and supportive care as standard. Clinical trial enrollment will be considered,
    as recommended. The treatment approach will be further tailored once subtype and
    risk factors are fully established.'
  required_facts:
  - The patient is a 7-year-old child with a new diagnosis of acute lymphoblastic
    leukemia (ALL).
  - ALL is the most common cancer in children.
  - Diagnostic workup included blood tests and bone marrow aspiration.
  - The bone marrow aspiration revealed more than 20% lymphoblasts in the marrow.
  - Subtype analysis is pending to distinguish between B-cell ALL (B-ALL) and T-cell
    ALL (T-ALL).
  - B-ALL is more common than T-ALL.
  - T-ALL may present with an enlarged thymus or breathing problems.
  - Further evaluation includes imaging tests.
  - Heart function assessment is part of the evaluation.
  - A lumbar puncture is performed to assess CNS involvement.
  - Biomarker and pharmacogenomic testing are ordered to assess for BCR::ABL1 status.
  - All patients with ALL receive steroids and multiagent chemotherapy.
  - Systemic therapy and supportive care are standard for ALL treatment.
  - Clinical trial enrollment will be considered as recommended.
  question_class: Creative Generation
