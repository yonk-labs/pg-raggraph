- id: Medical-5b2ade97
  question: You are a medical oncologist asked to summarize the evidence-based first-line
    treatment options for metastatic (Stage 4) colon cancer, including biomarker-driven
    therapy, surgical considerations, and palliative care integration.
  gold_answer: For Stage 4 (metastatic) colon cancer, initial management involves
    confirming distant metastases with contrast-enhanced CT imaging. All tumors must
    be tested for mismatch repair deficiency (dMMR)/microsatellite instability-high
    (MSI-H), as immunotherapy with checkpoint inhibitors (e.g., pembrolizumab, nivolumab)
    is preferred for dMMR/MSI-H cancers. For pMMR/MSS tumors, systemic chemotherapy
    regimens such as FOLFOX or CAPEOX are recommended. Surgical resection of the primary
    tumor or metastases may be considered for select patients with limited disease.
    Palliative care should be integrated early to address symptoms and improve quality
    of life. Surveillance with imaging and CEA testing is essential for monitoring
    treatment response.
  required_facts:
  - For Stage 4 (metastatic) colon cancer, distant metastases must be confirmed with
    contrast-enhanced CT imaging.
  - All tumors must be tested for mismatch repair deficiency (dMMR) or microsatellite
    instability-high (MSI-H).
  - Immunotherapy with checkpoint inhibitors is preferred for dMMR/MSI-H cancers.
  - Examples of checkpoint inhibitors include pembrolizumab and nivolumab.
  - Systemic chemotherapy regimens such as FOLFOX or CAPEOX are recommended for pMMR/MSS
    tumors.
  - Surgical resection of the primary tumor or metastases may be considered for select
    patients.
  - Palliative care should be integrated early to address symptoms.
  - Palliative care aims to improve quality of life.
  - Surveillance with imaging and CEA testing is essential for monitoring treatment
    response.
  question_class: Creative Generation
