- id: Medical-0cd460d0
  question: You are a clinician asked to create a discharge summary for a patient
    with newly diagnosed acute promyelocytic leukemia (APL), a subtype of AML, after
    induction therapy. Include diagnosis, genetic findings, treatment given, complications
    managed, and follow-up recommendations.
  gold_answer: "Discharge Summary:\n\nDiagnosis: Acute promyelocytic leukemia (APL),\
    \ a subtype of AML, confirmed by bone marrow biopsy showing >20% blasts and identification\
    \ of PML::RARA fusion gene. \n\nGenetic Findings: Cytogenetic and molecular testing\
    \ positive for PML::RARA fusion.\n\nTreatment: Induction therapy with chemotherapy\
    \ and targeted therapy initiated, as per guidelines for APL. Supportive care included\
    \ transfusions and infection prophylaxis.\n\nComplications: The patient developed\
    \ thrombocytopenia and neutropenic fever, managed with platelet transfusions and\
    \ broad-spectrum antibiotics.\n\nFollow-Up Recommendations: Continue consolidation\
    \ therapy as per protocol. Repeat bone marrow evaluation and molecular testing\
    \ to assess remission status. Monitor for differentiation syndrome and provide\
    \ ongoing supportive care.\n\nFertility counseling was completed prior to therapy."
  required_facts:
  - The patient has been diagnosed with acute promyelocytic leukemia (APL), a subtype
    of AML.
  - The diagnosis was confirmed by bone marrow biopsy showing more than 20% blasts.
  - The PML::RARA fusion gene was identified in the patient.
  - Cytogenetic and molecular testing was positive for the PML::RARA fusion.
  - Induction therapy with chemotherapy and targeted therapy was initiated.
  - Supportive care included transfusions.
  - Supportive care included infection prophylaxis.
  - The patient developed thrombocytopenia.
  - The patient developed neutropenic fever.
  - Thrombocytopenia was managed with platelet transfusions.
  - Neutropenic fever was managed with broad-spectrum antibiotics.
  - Consolidation therapy should continue as per protocol.
  - A repeat bone marrow evaluation and molecular testing are recommended to assess
    remission status.
  - Monitoring for differentiation syndrome is necessary.
  - Ongoing supportive care is required.
  - Fertility counseling was completed prior to therapy.
  question_class: Creative Generation
