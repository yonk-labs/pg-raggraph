- id: Medical-de2ed9e3
  question: Transform the core clinical and pathological features of mediastinal gray
    zone lymphoma (MGZL) into a formal referral letter from a primary care physician
    to a hematology specialist.
  gold_answer: 'Referral Letter:


    Dear Hematology Specialist,


    I am referring a 28-year-old male who presents with a rapidly enlarging mediastinal
    mass and supraclavicular lymphadenopathy. Imaging studies confirm a bulky mediastinal
    tumor. Histopathological examination has revealed the presence of Reed-Sternberg
    cells. Given the overlap of features between primary mediastinal B-cell lymphoma
    (PMBL) and Hodgkin lymphoma (HL), I am seeking your expert evaluation for possible
