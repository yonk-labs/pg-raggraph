- id: Medical-bc02cc6c
  question: Rewrite the key points from the prostate cancer guideline as a public
    health advisory aimed at men over 50, emphasizing risk factors, early detection,
    and available treatments.
  gold_answer: '**Public Health Advisory: Prostate Cancer Awareness for Men Over 50**


    Prostate cancer is one of the most common cancers among men. Early stages are
    often asymptomatic, making screening crucial for early detection. Risk increases
    with age, family history, Black race, and genetic mutations such as BRCA1 and
    BRCA2. Lifestyle factors including obesity, smoking, and high-fat diets may also
    elevate risk. Screening methods include the PSA blood test and digital rectal
    exam; abnormal results should be evaluated by a healthcare professional. Diagnosis
    is confirmed with a prostate biopsy and may include imaging such as MRI or ultrasound
    to determine disease extent. Treatment options vary by stage and risk group, ranging
    from active surveillance for low-risk cases to surgery, radiation, hormone therapy,
    and chemotherapy for more advanced disease. Regular follow-up with PSA testing
    and imaging is important for all men diagnosed with prostate cancer.'
  required_facts:
  - Prostate cancer is one of the most common cancers among men.
  - Early stages of prostate cancer are often asymptomatic.
  - Screening is crucial for early detection of prostate cancer.
  - The risk of prostate cancer increases with age.
  - A family history of prostate cancer increases risk.
  - Black race is a risk factor for prostate cancer.
  - Genetic mutations such as BRCA1 and BRCA2 increase the risk of prostate cancer.
  - Lifestyle factors such as obesity, smoking, and high-fat diets may elevate the
    risk of prostate cancer.
  - Screening methods for prostate cancer include the PSA blood test and digital rectal
    exam.
  - Abnormal screening results should be evaluated by a healthcare professional.
  - Diagnosis of prostate cancer is confirmed with a prostate biopsy.
  - Imaging such as MRI or ultrasound may be used to determine the extent of the disease.
  - Treatment options for prostate cancer vary by stage and risk group.
  - Active surveillance is an option for low-risk prostate cancer cases.
  - Surgery, radiation, hormone therapy, and chemotherapy are treatment options for
    more advanced prostate cancer.
  - Regular follow-up with PSA testing and imaging is important for men diagnosed
    with prostate cancer.
  question_class: Creative Generation
- id: Medical-5242d398
  question: You are an oncologist tasked with drafting an initial treatment plan for
    a patient newly diagnosed with non-clear cell RCC (papillary subtype) confined
    to the kidney, with no evidence of metastasis. Outline your diagnostic confirmation,
    staging, and treatment strategy.
  gold_answer: For this patient with a new diagnosis of papillary renal cell carcinoma
    (PRCC) confined to the kidney, I would first confirm the diagnosis using imaging
    tests (such as CT or MRI), blood and urine tests, and a percutaneous biopsy for
    histologic subtyping. Biomarker and genetic risk testing would be performed to
    identify any actionable alterations. Staging would ensure there is no local spread
    to surrounding fat, blood vessels, lymph nodes, or distant metastasis. Given the
    localized nature and non-clear cell histology, surgical resection (partial or
    radical nephrectomy depending on tumor size and location) is the mainstay of treatment.
    Further management would be determined by final pathology and risk assessment.
  required_facts:
  - The patient has a new diagnosis of papillary renal cell carcinoma (PRCC).
  - The PRCC is confined to the kidney.
  - The diagnosis will be confirmed using imaging tests such as CT or MRI.
  - Blood and urine tests will be performed for diagnostic confirmation.
  - A percutaneous biopsy will be conducted for histologic subtyping.
  - Biomarker and genetic risk testing will identify actionable alterations.
  - Staging will ensure there is no local spread to surrounding fat.
  - Staging will ensure there is no local spread to blood vessels.
  - Staging will ensure there is no local spread to lymph nodes.
  - Staging will ensure there is no distant metastasis.
  - Surgical resection is the mainstay of treatment.
  - The surgical resection may be partial or radical nephrectomy.
  - The type of nephrectomy depends on tumor size and location.
  - Further management will be determined by final pathology and risk assessment.
  question_class: Creative Generation
