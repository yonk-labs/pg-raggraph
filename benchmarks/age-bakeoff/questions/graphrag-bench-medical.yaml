- id: Medical-ec347ef8
  question: Rewrite the core recommendations from the liver cancer guideline as a
    public health advisory targeted at patients with cirrhosis or chronic hepatitis
    B. Ensure to include screening frequency, methods, and rationale using evidence
    from the guideline.
  gold_answer: '**Public Health Advisory: Liver Cancer Screening for At-Risk Individuals**


    If you have cirrhosis or chronic hepatitis B, you are at increased risk for developing
    liver cancer. Early detection improves treatment options and outcomes. We strongly
    recommend that all individuals with cirrhosis or chronic hepatitis B undergo liver
    cancer screening with ultrasound and alpha-fetoprotein (AFP) blood tests every
    6 months. These tests can identify liver cancer at a stage when it is more treatable.
    Please speak with your healthcare provider about arranging regular screening.'
  required_facts:
  - Individuals with cirrhosis or chronic hepatitis B are at increased risk for developing
    liver cancer.
  - Early detection improves treatment options and outcomes.
  - All individuals with cirrhosis or chronic hepatitis B should undergo liver cancer
    screening.
  - Liver cancer screening should include ultrasound and alpha-fetoprotein (AFP) blood
    tests.
  - Screening should occur every 6 months.
  - These tests can identify liver cancer at a more treatable stage.
  - Patients should speak with their healthcare provider about arranging regular screening.
  question_class: Creative Generation
