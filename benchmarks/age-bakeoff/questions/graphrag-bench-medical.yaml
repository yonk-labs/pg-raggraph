    the diagnostic findings, risk factors, and recommend further specialist evaluation
    and treatment options.
  gold_answer: 'Referral Note:


    Patient is a 58-year-old with a 30 pack-year smoking history presenting with persistent
    cough and chest pain. Imaging revealed a lung nodule, and biopsy confirmed NSCLC,
    likely Stage 2 based on local extension without distant spread. Major risk factors
    include tobacco use and possible occupational exposure to asbestos. Recommend
    thoracic oncology evaluation for definitive staging and management. As per guidelines,
    treatment options include surgery and/or chemoradiation. Supportive care for symptom
    management and follow-up surveillance should be discussed.'
