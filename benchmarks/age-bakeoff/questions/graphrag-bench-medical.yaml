    metabolic panel (CMP), and lactate dehydrogenase (LDH) to evaluate cytopenias
    and cell turnover. Bone marrow aspirate and biopsy were performed, with histopathology
    confirming increased blasts. Flow cytometry and immunophenotyping defined the
