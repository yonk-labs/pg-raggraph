- id: Medical-1f9a3a9d
  question: Imagine you are a hematology fellow asked to write a detailed diagnostic
    summary for a patient with suspected chronic lymphocytic leukemia (CLL). Your
    summary should integrate the required laboratory and imaging tests, key biomarkers,
    risk assessment, and steps to confirm the diagnosis, as per the clinical practice
    guideline.
  gold_answer: 'Diagnostic Summary: The patient presents with persistent lymphocytosis
    and clinical features suggestive of CLL, including swollen glands and fatigue.
    Initial laboratory evaluation should include a complete blood count (CBC), demonstrating
    ≥5,000 monoclonal B lymphocytes per microliter. Flow cytometry is warranted to
    confirm the immunophenotype of the lymphocytes, assessing for surface markers
    such as CD20, CD200, and LEF1. Additional biomarker testing with FISH should be
    performed to identify 17p deletion, and DNA sequencing is indicated for TP53 and
    IGHV mutations. Karyotype analysis will further evaluate for complex chromosomal
    abnormalities. Diagnostic imaging with a CT scan is recommended to assess lymph
    node and organ involvement. Risk assessment should include evaluation of beta-2
    microglobulin for disease activity and a thorough review of the patient''s age
    and family history, as these are significant risk factors for CLL. If needed,
    a lymph node or bone marrow biopsy may be performed to support the diagnosis.'
  required_facts:
  - The patient presents with persistent lymphocytosis.
  - Clinical features suggest chronic lymphocytic leukemia (CLL).
  - The patient has swollen glands and fatigue.
  - Initial laboratory evaluation includes a complete blood count (CBC).
  - The CBC should demonstrate ≥5,000 monoclonal B lymphocytes per microliter.
  - Flow cytometry is warranted to confirm the immunophenotype of the lymphocytes.
  - Surface markers such as CD20, CD200, and LEF1 are assessed in flow cytometry.
  - Additional biomarker testing with FISH is performed to identify 17p deletion.
  - DNA sequencing is indicated for TP53 and IGHV mutations.
  - Karyotype analysis evaluates for complex chromosomal abnormalities.
  - Diagnostic imaging with a CT scan is recommended to assess lymph node and organ
    involvement.
  - Risk assessment includes evaluation of beta-2 microglobulin for disease activity.
  - The patient's age and family history are significant risk factors for CLL.
  - A lymph node or bone marrow biopsy may be performed to support the diagnosis if
    needed.
  question_class: Creative Generation
