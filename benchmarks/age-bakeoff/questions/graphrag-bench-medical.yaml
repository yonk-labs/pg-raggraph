  question: As a medical intern on the oncology ward, you are asked to prepare a multidisciplinary
    team (MDT) note summarizing the pathogenesis, diagnostic approach, and clinical
    classification of cutaneous B-cell lymphomas to educate new team members.
  gold_answer: 'MDT Educational Note: Cutaneous B-cell lymphomas (CBCL) are a subset
    of primary cutaneous lymphomas (PCL), which are non-Hodgkin lymphomas that originate
    in the skin. CBCLs develop from abnormal B lymphocytes, a type of white blood
    cell involved in immune defense. The pathogenesis involves unregulated growth
    of these lymphocytes, resulting in disease. CBCL typically presents as nodules
    or papules confined to the skin. Diagnosis requires a combination of skin examination,
    blood tests, imaging studies, and confirmatory biopsy with immunophenotyping to
    determine cell lineage. Further testing for biomarkers and genetic changes aids
    in precise classification. Major CBCL subtypes include primary cutaneous marginal
    zone lymphoma (PCMZL), primary cutaneous follicle center lymphoma (PCFCL), and
    primary cutaneous diffuse large B-cell lymphoma, leg type (PC-DLBCL, leg type).
    Most CBCLs are slow-growing, but aggressive variants exist.'
  required_facts:
  - Cutaneous B-cell lymphomas (CBCL) are a subset of primary cutaneous lymphomas
    (PCL).
  - PCLs are non-Hodgkin lymphomas that originate in the skin.
  - CBCLs develop from abnormal B lymphocytes.
  - B lymphocytes are a type of white blood cell involved in immune defense.
  - The pathogenesis involves unregulated growth of B lymphocytes.
  - CBCL typically presents as nodules or papules confined to the skin.
  - Diagnosis requires a combination of skin examination and blood tests.
  - Imaging studies are needed for diagnosis.
  - Confirmatory biopsy with immunophenotyping is required to determine cell lineage.
  - Further testing for biomarkers and genetic changes aids in precise classification.
  - Major CBCL subtypes include primary cutaneous marginal zone lymphoma (PCMZL).
  - Major CBCL subtypes include primary cutaneous follicle center lymphoma (PCFCL).
  - Major CBCL subtypes include primary cutaneous diffuse large B-cell lymphoma, leg
    type (PC-DLBCL, leg type).
  - Most CBCLs are slow-growing.
  - Aggressive variants of CBCL exist.
  question_class: Creative Generation
