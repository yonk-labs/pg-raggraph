    question: "Which people who know about PostgreSQL also work on projects that depend on the Auth Service?"
    gold_answer: "Alice Chen knows PostgreSQL and works on Billing Migration and Auth Overhaul, both of which depend on Auth Service. Bob Martinez knows PostgreSQL and works on Billing Migration (depends on Auth Service) and Search Redesign (depends on Auth Service). Elena Petrov knows PostgreSQL and works on ML Pipeline (no Auth Service dependency). Kate Johansson knows PostgreSQL and works on Search Redesign (depends on Auth Service). Frank Okafor knows PostgreSQL and works on Data Lake Consolidation and Analytics Dashboard (neither depends on Auth Service directly)."
    required_facts: ["Alice Chen", "Bob Martinez", "Kate Johansson", "PostgreSQL", "Auth Service", "Billing Migration", "Search Redesign"]
    required_entities: ["p-alice", "p-bob", "p-kate", "tech-postgres", "svc-auth", "proj-billing", "proj-search"]
