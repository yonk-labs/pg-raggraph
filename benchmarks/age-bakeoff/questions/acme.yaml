    notes: "Requires: Person -> KNOWS_ABOUT -> PostgreSQL, Person -> WORKS_ON -> Project, Project -> DEPENDS_ON -> Auth Service"

  - id: acme-q-027
    question: "What services are indirectly affected when the Auth Service goes down, considering service-to-service dependencies?"
    gold_answer: "The Auth Service is depended on by the Payment Service, Search API, and Analytics Ingestion directly. The Payment Service further depends on Notification Service but Auth Service failure cascades through Payment Service, Search API, and Analytics Ingestion. This means projects like Billing Migration, Search Redesign, Analytics Dashboard, ML Pipeline, Auth Overhaul, and Mobile App v2 are all affected."
    required_facts: ["Auth Service", "Payment Service", "Search API", "Analytics Ingestion", "Billing Migration", "Search Redesign"]
    required_entities: ["svc-auth", "svc-payment", "svc-search", "svc-analytics"]
    question_class: multi_hop_bridging
    notes: "Requires: Service -> DEPENDS_ON -> Auth Service (direct), then Project -> DEPENDS_ON -> those services (transitive)"

