# Deep run — Phase E: doc-summary granularity x coverage, + fair oracle.
#
# Isolates two variables the chunk-vs-doc crossover conflated:
#   * coverage   — how many parent docs we feed (top-3 / 5 / 10 of the docs the
#                  25 retrieved chunks span). Answers "the max_docs=3 cap was a
#                  hidden lever" and gives a fair full-doc oracle sweep.
#   * granularity — concat-then-summarize (doc_summary_facts@N) vs
#                   summarize-each-doc-separately (per_doc_summary_facts@N).
#
# "@N" = top-N parent docs of the retrieved chunks. The doc pool is sized by
# full_document.max_docs below (10), so @10 has docs to work with.
#
# Anchors: classic_chunks@25 (baseline to beat) and chunk_summary_facts (the
# breadth-robust Phase D winner). Reuses staged namespaces — no re-ingest.
run:
  id: deep-e-perdoc-coverage
  output_dir: .matrix-runs/deep-e-perdoc-coverage
  cache_dir: .matrix-runs/cache
  resume: true
  concurrency: 4

suite:
  namespace_prefix: deepe

workloads:
  - name: mhr
    subset: 30
    seed: 4225
    namespace: bench_mhr_lede_spacy
    tags: [perdoc-coverage, news]
  - name: scotus
    subset: 30
    seed: 4225
    namespace: mx_deepcs_scotus_lede_spacy_bge_large_en_auto_512_50_a67495e2
    tags: [perdoc-coverage, legal]

ingest:
  reuse_existing_shapes: true
  refresh_shapes: false
  arms: [lede_spacy]
  embeddings:
    - label: bge-large
      model: BAAI/bge-large-en-v1.5
      dim: 1024
      provider: local
  chunk_strategies: [auto]
  chunk_max_tokens: [512]
  chunk_overlap_tokens: [50]

retrieval:
  modes: [hybrid]
  retrieval_strategies: [weighted]
  rerank: [false]
  top_k: [25]

context:
  max_selected_docs: 10
  strategies:
    - classic_chunks                  # anchor: 25 raw chunks
    - chunk_summary_facts             # anchor: breadth-robust Phase D winner
    - full_selected_docs@3            # fair-oracle sweep
    - full_selected_docs@5
    - full_selected_docs@10
    - doc_summary_facts@3             # concat-then-summarize, coverage sweep
    - doc_summary_facts@5
    - doc_summary_facts@10
    - per_doc_summary_facts@3         # summarize each doc separately, coverage sweep
    - per_doc_summary_facts@5
    - per_doc_summary_facts@10
    - per_doc5_chunksum_top5          # kitchen sink

baselines:
  full_document:
    max_docs: 10                      # sizes the doc pool fed to @N strategies
    max_context_tokens: 120000
  classic_rag:
    top_k: 25
    chunker: auto

answer:
  provider: openai-compatible
  model: Intel/Qwen3-Coder-Next-int4-AutoRound
  base_url: http://192.168.1.193:8000/v1

judge:
  mode: accurate
  concurrency: 8
  retries: 2
  parse_retries: 2
  timeout: 180
  temperature: 0.0
  max_tokens: 1200
  strict_json_fallback: true
  providers:
    - provider: openai-compatible
      model: Intel/Qwen3-Coder-Next-int4-AutoRound
      base_url: http://192.168.1.193:8000/v1
    - provider: openai-compatible
      model: cyankiwi/gemma-4-26B-A4B-it-AWQ-4bit
      base_url: http://192.168.1.133:8000/v1
