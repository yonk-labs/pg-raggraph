# Deep run — Phase D: scaled validation of the winning summary-packing strategies.
#
# Phase C (n=10) surfaced a corpus-dependent crossover: on MHR news the best
# summary source is the retrieved CHUNKS, while on SCOTUS legal opinions it's
# the full DOC. This phase validates that at larger n on both corpora, narrowed
# to the strategies that mattered:
#
#   - classic_chunks                              (baseline: 25 raw chunks @ top_k=25)
#   - chunk_summary_facts                         (MHR winner)
#   - doc_summary_facts                           (SCOTUS winner — the other half)
#   - chunk_summary_toc_facts_plus_top5           (robust challenger)
#   - doc_and_chunk_summary_toc_facts_plus_top5   (most corpus-robust hedge)
#
# Reuses the staged namespaces (no re-ingest). MHR = 60 curated answerable
# questions (null_query excluded; 20 each inference/comparison/temporal).
# SCOTUS = 30 RAG-fair questions (easy+medium+layup buckets).
run:
  id: deep-d-summary-validation
  output_dir: .matrix-runs/deep-d-summary-validation
  cache_dir: .matrix-runs/cache
  resume: true
  concurrency: 4

suite:
  namespace_prefix: deepd

workloads:
  - name: mhr
    subset: 60
    seed: 4225
    namespace: bench_mhr_lede_spacy
    tags: [summary-validation, news]
  - name: scotus
    subset: 30
    seed: 4225
    namespace: mx_deepcs_scotus_lede_spacy_bge_large_en_auto_512_50_a67495e2
    tags: [summary-validation, legal]

ingest:
  reuse_existing_shapes: true
  refresh_shapes: false
  arms: [lede_spacy]
  embeddings:
    - label: bge-large
      model: BAAI/bge-large-en-v1.5
      dim: 1024
      provider: local
  chunk_strategies: [auto]
  chunk_max_tokens: [512]
  chunk_overlap_tokens: [50]

retrieval:
  modes: [hybrid]
  retrieval_strategies: [weighted]
  rerank: [false]
  top_k: [25]

context:
  max_selected_docs: 3
  strategies:
    - classic_chunks
    - chunk_summary_facts
    - doc_summary_facts
    - chunk_summary_toc_facts_plus_top5
    - doc_and_chunk_summary_toc_facts_plus_top5

baselines:
  full_document:
    max_docs: 3
    max_context_tokens: 120000
  classic_rag:
    top_k: 25
    chunker: auto

answer:
  provider: openai-compatible
  model: Intel/Qwen3-Coder-Next-int4-AutoRound
  base_url: http://192.168.1.193:8000/v1

judge:
  mode: accurate
  concurrency: 8
  retries: 2
  parse_retries: 2
  timeout: 180
  temperature: 0.0
  max_tokens: 1200
  strict_json_fallback: true
  providers:
    - provider: openai-compatible
      model: Intel/Qwen3-Coder-Next-int4-AutoRound
      base_url: http://192.168.1.193:8000/v1
    - provider: openai-compatible
      model: cyankiwi/gemma-4-26B-A4B-it-AWQ-4bit
      base_url: http://192.168.1.133:8000/v1
