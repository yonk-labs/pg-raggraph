run:
  id: matrix-full-local-judges
  output_dir: .matrix-runs/matrix-full-local-judges
  cache_dir: .matrix-runs/cache
  resume: true
  concurrency: 1

suite:
  namespace_prefix: mxfull

workloads:
  - name: mhr
    subset: 100
    seed: 42
    tags: [multi-hop, news]
  - name: musique
    subset: 100
    seed: 42
    tags: [multi-hop, compositional]
  - name: twowiki
    subset: 100
    seed: 42
    tags: [multi-hop, wiki]

ingest:
  # Fast reload: staged shapes are keyed by dataset/arm/embedder/chunker/tokens.
  # Keep this true for repeated sweeps; set refresh_shapes=true only when the
  # underlying corpus, chunker implementation, or embedding model changed.
  reuse_existing_shapes: true
  refresh_shapes: false
  arms: [lede_spacy]
  embeddings:
    - label: bge-large
      model: BAAI/bge-large-en-v1.5
      dim: 1024
      provider: local
  chunk_strategies:
    - auto
    - hierarchy
    - chunkshop:hierarchy
    - chunkshop:sentence_aware
    - chunkshop:semantic
    - chunkshop:fixed_overlap
    - chunkshop:neighbor_expand
  chunk_max_tokens: [512]
  chunk_overlap_tokens: [50]

retrieval:
  modes: [naive, naive_boost, local, global, hybrid, smart, summary]
  retrieval_strategies: [weighted, pre_filter, vector_first]
  summary_base_modes: [hybrid]
  rerank: [false]
  top_k: [10, 25, 50, 100]

context:
  max_selected_docs: 3
  strategies:
    - classic_chunks
    - full_selected_docs
    - doc_summary_facts
    - hint_doc_summary_facts
    - doc_summary_toc_facts
    - doc_summary_facts_plus_chunks
    - hint_doc_summary_facts_plus_chunks
    - toc_doc_summary_plus_chunk_summary

baselines:
  full_document:
    max_docs: 3
    max_context_tokens: 120000
  classic_rag:
    top_k: 25
    chunker: auto

answer:
  provider: openai-compatible
  model: Intel/Qwen3-Coder-Next-int4-AutoRound
  base_url: http://192.168.1.193:8000/v1

judge:
  mode: accurate
  concurrency: 1
  retries: 2
  parse_retries: 2
  timeout: 180
  temperature: 0.0
  max_tokens: 1200
  strict_json_fallback: true
  providers:
    - provider: openai-compatible
      model: Intel/Qwen3-Coder-Next-int4-AutoRound
      base_url: http://192.168.1.193:8000/v1
    - provider: openai-compatible
      model: cyankiwi/gemma-4-26B-A4B-it-AWQ-4bit
      base_url: http://192.168.1.133:8000/v1
