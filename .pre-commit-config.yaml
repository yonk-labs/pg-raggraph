# Local pre-commit hooks that mirror CI's lint job exactly.
#
# Why local (not astral-sh/ruff-pre-commit): the hook reuses the project's
# uv-locked ruff version, so pre-commit can't drift from CI's ruff version.
# Tradeoff: requires `uv` on the contributor's PATH. That's the documented
# dev tool for this repo (see CONTRIBUTING.md → Local development setup).
#
# Install once per clone:
#   uv tool install pre-commit
#   pre-commit install
#
# Then ruff check + ruff format --check run automatically on every
# `git commit`. To run them on the full repo on demand:
#   pre-commit run --all-files
#
# CI (`.github/workflows/test.yml`) runs the same two commands; keep them
# in sync. If you change one, change the other.

repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check (lint rules)
        entry: uv run ruff check
        language: system
        types: [python]
        pass_filenames: false
        require_serial: true

      - id: ruff-format-check
        name: ruff format --check (formatting)
        entry: uv run ruff format --check
        language: system
        types: [python]
        pass_filenames: false
        require_serial: true
