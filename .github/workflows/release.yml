name: release

# Triggered by pushing a `v*` tag (e.g., `git tag v0.3.0a2 && git push --tags`).
# Builds the wheel + sdist with `uv build` and publishes to PyPI using
# Trusted Publishing (OIDC) — no token in repo secrets, the GitHub
# repo + workflow + environment is registered as a publisher on the
# PyPI side.
#
# PyPI Trusted Publishing setup (https://docs.pypi.org/trusted-publishers/):
#   - Repo owner: yonk-labs
#   - Repo name: pg_raggraph
#   - Workflow filename: release.yml
#   - Environment name: pypi
#
# `uv publish` auto-detects OIDC when running in GitHub Actions with
# `permissions.id-token: write`. No token env var required.
#
# TestPyPI fallback (token-based) is preserved for dry-runs via
# workflow_dispatch with target=testpypi. Provide a TESTPYPI_TOKEN secret
# under the testpypi environment to use it.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      target:
        description: "Publish target"
        required: true
        default: "pypi"
        type: choice
        options:
          - pypi
          - testpypi

permissions:
  contents: read

jobs:
  build:
    name: Build wheel + sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.12"
      - name: Build distributions
        run: uv build
      - name: Inspect artifacts
        run: |
          ls -la dist/
          # Sanity: wheel must contain SQL files (schema + migrations) so
          # auto-bootstrap works after `pip install pg-raggraph`.
          uv run python -c "
          import zipfile, glob
          (whl,) = glob.glob('dist/*.whl')
          z = zipfile.ZipFile(whl)
          names = z.namelist()
          assert any('sql/schema.sql' in n for n in names), 'missing schema.sql'
          assert any('sql/migrations/' in n for n in names), 'missing migrations'
          assert any('static/index.html' in n for n in names), 'missing static UI'
          print(f'wheel manifest sane: {len(names)} entries')
          "
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # OIDC requires `id-token: write` at the job level. `contents: read`
    # is inherited from the workflow-level grant.
    permissions:
      id-token: write
      contents: read
    # The job only publishes on real `v*` tag pushes, OR when explicitly
    # dispatched. Workflow re-runs on the same tag are no-ops because PyPI
    # rejects duplicate version uploads.
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch')
    environment:
      name: ${{ github.event.inputs.target == 'testpypi' && 'testpypi' || 'pypi' }}
      url: ${{ github.event.inputs.target == 'testpypi' && 'https://test.pypi.org/project/pg-raggraph/' || 'https://pypi.org/project/pg-raggraph/' }}
    steps:
      - uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish (PyPI via Trusted Publishing / OIDC)
        if: github.event.inputs.target != 'testpypi'
        run: uv publish dist/*
      - name: Publish (TestPyPI, token-based)
        if: github.event.inputs.target == 'testpypi'
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.TESTPYPI_TOKEN }}
        run: |
          if [ -z "$UV_PUBLISH_TOKEN" ]; then
            echo "::error::TESTPYPI_TOKEN secret is not set in the testpypi environment."
            exit 1
          fi
          uv publish --publish-url https://test.pypi.org/legacy/ dist/*
